<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>What is Data?</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.13.6/underscore-min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundation/5.1.1/css/normalize.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundation/5.1.1/css/foundation.min.css">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Fira+Sans" rel="stylesheet">

  <style type="text/css">
    body { color: #434343; background: #fff; margin: 40px; font-family: "Open Sans", sans-serif; }
    h1 { font-family: "Fira Sans", sans-serif; }
    #content { width: 800px; padding-top: 20px; font-size: 25px; font-family: "Segoe UI Light", "Segoe UI", "Helvetica Neue", Arial, sans-serif;font-weight: 300; }
    #notes { font-size: 13px; color: #666; padding-top: 15px; }
    .quote-style { line-height: 1.4; color: #222; }
  </style>
</head>
<body>

  <h1>What is Data?</h1>
  
  <div id="content">
    <div id="display-area" class="quote-style">Loading definition...</div>
  </div>

  <hr>
  <p id="notes"><strong>NB</strong>: Refresh the page to get a new definition.</p>
  <p>By <a href="https://www.ashrike.tech/">Ashish Kumar</a></p>

  <script>
    // 1. Use the direct filename (no ./ or /)
    d3.csv("data.csv").then(function(quotes) {
        
        // 2. Pick a random row
        var randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        
        // 3. Select the ID and inject the text
        // Ensure your CSV has a column header named 'definition'
        d3.select("#display-area").text(randomQuote.definition);

    }).catch(function(error) {
        // This will tell you in the 'Console' if the file is missing
        console.error("Critical Error: ", error);
        d3.select("#display-area").text("Failed to load data. Check console.");
    });
  </script>
</body>
</html>
